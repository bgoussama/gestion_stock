<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Produit')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="container py-4">
    <div class="page-title"><div><h1>Produit</h1><p>Fiche article, valorisation et regles d'alerte.</p></div></div>
    <form class="panel" th:action="@{/products}" th:object="${product}" method="post">
        <div class="panel-header">
            <div>
                <h2>Informations produit</h2>
                <p>Les champs stock et seuil alimentent automatiquement les alertes.</p>
            </div>
        </div>
        <input type="hidden" th:field="*{id}">
        <div class="row g-3">
            <div class="col-md-4"><label class="form-label">Reference</label><input class="form-control" th:field="*{reference}"></div>
            <div class="col-md-8"><label class="form-label">Nom</label><input class="form-control" th:field="*{name}"></div>
            <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" th:field="*{description}"></textarea></div>
            <div class="col-md-4"><label class="form-label">Prix unitaire</label><input class="form-control" type="number" step="0.01" th:field="*{unitPrice}"></div>
            <div class="col-md-4"><label class="form-label">Quantite</label><input class="form-control" type="number" th:field="*{quantity}"></div>
            <div class="col-md-4"><label class="form-label">Seuil d'alerte</label><input class="form-control" type="number" th:field="*{alertThreshold}"></div>
            <div class="col-md-6">
                <label class="form-label">Categorie</label>
                <select class="form-select" th:field="*{category}">
                    <option value="">-</option>
                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Fournisseur</label>
                <select class="form-select" th:field="*{supplier}">
                    <option value="">-</option>
                    <option th:each="supplier : ${suppliers}" th:value="${supplier.id}" th:text="${supplier.name}"></option>
                </select>
            </div>
            <div class="col-12"><label class="form-label">URL image</label><input class="form-control" th:field="*{imageUrl}"></div>
        </div>
        <div class="mt-4 d-flex gap-2">
            <button class="btn btn-primary">Enregistrer</button>
            <a class="btn btn-outline-secondary" th:href="@{/products}">Annuler</a>
        </div>
    </form>
</main>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
