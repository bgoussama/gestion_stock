<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Produits')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="container-fluid py-4">
    <div class="page-title">
        <div><h1>Produits</h1><p>Catalogue centralise avec disponibilite, seuils et rattachements fournisseurs.</p></div>
        <a class="btn btn-primary" th:href="@{/products/new}"><i class="bi bi-plus-lg"></i> Nouveau</a>
    </div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <form class="panel row g-2 mb-3 align-items-center" th:action="@{/products}" method="get">
        <div class="col-lg-7">
            <label class="form-label mb-1">Recherche catalogue</label>
            <input class="form-control" name="q" th:value="${q}" placeholder="Nom, reference produit">
        </div>
        <div class="col-lg-auto pt-lg-4">
            <button class="btn btn-outline-primary"><i class="bi bi-search"></i> Rechercher</button>
        </div>
    </form>
    <div class="panel">
        <div class="panel-header">
            <div>
                <h2>Inventaire produits</h2>
                <p>Les lignes en alerte indiquent un stock inferieur ou egal au seuil.</p>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead><tr><th>Reference</th><th>Produit</th><th>Categorie</th><th>Fournisseur</th><th>Prix</th><th>Stock</th><th>Statut</th><th></th></tr></thead>
                <tbody>
                <tr th:each="product : ${products}" th:classappend="${product.lowStock} ? 'table-warning'">
                    <td th:text="${product.reference}"></td>
                    <td><strong th:text="${product.name}"></strong><div class="small text-secondary" th:text="${product.description}"></div></td>
                    <td th:text="${product.category != null ? product.category.name : '-'}"></td>
                    <td th:text="${product.supplier != null ? product.supplier.name : '-'}"></td>
                    <td th:text="${product.unitPrice} + ' MAD'"></td>
                    <td><span class="badge" th:classappend="${product.lowStock} ? ' text-bg-warning' : ' text-bg-success'" th:text="${product.quantity}"></span></td>
                    <td><span class="badge" th:classappend="${product.lowStock} ? ' text-bg-warning' : ' text-bg-success'" th:text="${product.lowStock} ? 'A reapprovisionner' : 'Disponible'"></span></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-secondary" th:href="@{/products/{id}/edit(id=${product.id})}"><i class="bi bi-pencil"></i></a>
                        <form class="d-inline" th:action="@{/products/{id}/delete(id=${product.id})}" method="post">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(products)}"><td colspan="8" class="text-center text-secondary">Aucun produit trouve.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
