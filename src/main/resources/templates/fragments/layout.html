<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' - Gestion Stock'">Gestion Stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<header th:fragment="nav" class="app-header">
    <div class="app-header-inner">
        <a class="brand" th:href="@{/}">
            <span class="brand-mark"><i class="bi bi-boxes"></i></span>
            <span>
                <strong>StockPilot</strong>
                <small>Gestion inventaire</small>
            </span>
        </a>
        <div class="topbar-search">
            <i class="bi bi-search"></i>
            <span>Recherche rapide produits, documents, fournisseurs</span>
        </div>
        <div class="topbar-actions">
            <span class="user-chip"><i class="bi bi-person-circle"></i><span sec:authentication="name">admin</span></span>
            <form th:action="@{/logout}" method="post">
                <button class="icon-button" type="submit" title="Deconnexion" aria-label="Deconnexion">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>
    <nav class="app-nav-bar" aria-label="Navigation principale">
        <a class="app-nav-link" th:href="@{/}"><i class="bi bi-grid-1x2"></i><span>Tableau de bord</span></a>
        <a class="app-nav-link" th:href="@{/products}"><i class="bi bi-box-seam"></i><span>Produits</span></a>
        <a class="app-nav-link" th:href="@{/movements}"><i class="bi bi-arrow-left-right"></i><span>Mouvements</span></a>
        <a class="app-nav-link" th:href="@{/alerts}"><i class="bi bi-bell"></i><span>Alertes</span></a>
        <a class="app-nav-link" th:href="@{/documents}"><i class="bi bi-file-earmark-text"></i><span>Documents</span></a>
        <a class="app-nav-link" th:href="@{/categories}"><i class="bi bi-tags"></i><span>Categories</span></a>
        <a class="app-nav-link" th:href="@{/suppliers}"><i class="bi bi-truck"></i><span>Fournisseurs</span></a>
    </nav>
</header>
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</th:block>
</body>
</html>
